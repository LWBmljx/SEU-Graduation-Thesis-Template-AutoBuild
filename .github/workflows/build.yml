name: Build thesis

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - uses: TeX-Live/setup-texlive-action@v4
      with:
        packages: >-
          texliveonfly
          scheme-basic
          hyperref
          latexmk
          biblatex
          xelatex
          xetex
          threeparttable
          multirow
          longtable
          algorithms
          ctex
          iftex
          kvdefinekeys
          kvsetkeys
          kvoptions
          etoolbox
          filehook
          xparse
          geometry
          fancyhdr
          amsmath
          graphicx
          caption
          pdfpages
          footmisc
          xecjk
          array
          booktabs
          fontenc
          bm
          float
          biblatex-gb7714-2015
          biber
          texlive-lang-chinese
          collection-latexrecommended
          collection-mathscience
          tocloft
          eso-pic
          microtype
          ragged2e
          chngcntr
          pifont
    - run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
    - run: latexmk main.tex
    - run: latexmk -c
    
    - uses: actions/upload-artifact@v7
      with:
        name: main pdf
        path: main.pdf
